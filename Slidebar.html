<script>
    // Set active menu item based on current page
    function setActive(element) {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
        });
        element.classList.add('active');
        
        // Store the current page
        sessionStorage.setItem('currentPage', element.querySelector('span').textContent);
    }

    // Go to dashboard with correct path
    function goToDashboard() {
        // Check if we're in the pages folder
        const path = window.location.pathname;
        if (path.includes('/pages/')) {
            window.location.href = '../index.html';
        } else {
            window.location.href = 'index.html';
        }
    }

    // Load user data
    document.addEventListener('DOMContentLoaded', function() {
        const username = sessionStorage.getItem('planit_username') || localStorage.getItem('planit_username');
        const userEmail = sessionStorage.getItem('planit_userEmail') || localStorage.getItem('planit_userEmail');
        
        const nameElement = document.getElementById('displayName');
        const emailElement = document.getElementById('displayEmail');
        
        if (nameElement) nameElement.textContent = username || 'Monisha';
        if (emailElement) emailElement.textContent = userEmail || 'monisha@planit.com';
        
        // Highlight current page in sidebar
        highlightCurrentPage();
    });

    function highlightCurrentPage() {
        const currentPath = window.location.pathname.split('/').pop();
        
        // Remove active class from all
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
        });
        
        // Add active class to current page
        document.querySelectorAll('.nav-item').forEach(item => {
            const href = item.getAttribute('href');
            if (href && href === currentPath) {
                item.classList.add('active');
            }
        });
        
        // Special case for index.html
        if (currentPath === 'index.html' || currentPath === '') {
            document.getElementById('nav-personal-dashboard')?.classList.add('active');
        }
    }
</script>
