<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task Planner and Organizer - Dashboard</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #2e1065 100%);
            display: flex;
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
            pointer-events: none;
            animation: gradientShift 20s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 300px;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.3);
        }

        .sidebar-header {
            padding: 0 20px 25px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4);
            animation: float 3s ease infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: white;
            line-height: 1.2;
        }

        .logo-text span {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 16px;
        }

        .logo-text .full-title {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
            margin-top: 2px;
        }

        /* User Profile */
        .user-profile {
            margin: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .user-avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 28px;
            color: white;
            font-weight: 600;
            border: 3px solid rgba(255, 255, 255, 0.2);
        }

        .user-name {
            color: white;
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .user-email {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-bottom: 10px;
        }

        .user-badge {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        /* Navigation */
        .nav-menu {
            flex: 1;
            padding: 0 15px;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            margin: 4px 0;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            transition: all 0.3s;
            gap: 15px;
            cursor: pointer;
            text-decoration: none;
            width: 100%;
            border: none;
            background: none;
            text-align: left;
            font-size: 15px;
        }

        .nav-item:hover {
            background: rgba(139, 92, 246, 0.15);
            color: white;
            transform: translateX(5px);
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(139, 92, 246, 0.2), transparent);
            color: white;
        }

        .nav-item i {
            width: 24px;
            font-size: 20px;
            color: #8b5cf6;
        }

        .nav-item.active i {
            color: white;
        }

        .nav-badge {
            margin-left: auto;
            background: rgba(139, 92, 246, 0.2);
            color: #8b5cf6;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 20px 15px;
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            margin-left: 300px;
            padding: 30px;
            width: calc(100% - 300px);
            position: relative;
            z-index: 10;
            min-height: 100vh;
            overflow-y: auto;
        }

        /* Content Container - Dynamic Content Loads Here */
        .content-container {
            width: 100%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Dashboard Content */
        .dashboard-content {
            display: block;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 25px 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .welcome-text h1 {
            color: white;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .welcome-text h1 span {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
            margin-left: 10px;
        }

        .welcome-text p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
        }

        .date-display {
            background: rgba(255, 255, 255, 0.08);
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .date-display i {
            color: #8b5cf6;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s;
            pointer-events: none;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(139, 92, 246, 0.1);
            border-color: #8b5cf6;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: rgba(139, 92, 246, 0.15);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #8b5cf6;
        }

        .stat-info h3 {
            color: white;
            font-size: 28px;
            font-weight: 700;
        }

        .stat-info p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        /* Recent Tasks */
        .recent-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            color: white;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .view-all {
            color: #8b5cf6;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            pointer-events: none;
            opacity: 0.7;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }

        .task-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #8b5cf6;
        }

        .task-dot.completed {
            background: #10b981;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            color: white;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .task-time {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
        }

        /* ========== SMART TASKS STYLES ========== */
        .smart-tasks-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
        }

        .smart-tasks-title {
            color: white;
            font-size: 32px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .smart-tasks-title i {
            color: #8b5cf6;
            font-size: 36px;
        }

        .add-task-form {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .form-title {
            color: white;
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-title i {
            color: #8b5cf6;
        }

        .task-form-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 15px;
        }

        .task-input, .task-select {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            font-size: 14px;
        }

        .task-input:focus, .task-select:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        .task-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .task-select option {
            background: #1e1b4b;
            color: white;
        }

        .add-task-btn {
            padding: 15px 25px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .add-task-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .task-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            border-left: 5px solid transparent;
            transition: all 0.3s;
        }

        .task-card:hover {
            transform: translateY(-5px);
            background: rgba(139, 92, 246, 0.1);
        }

        .task-card.priority-high {
            border-left-color: #ef4444;
        }

        .task-card.priority-medium {
            border-left-color: #f59e0b;
        }

        .task-card.priority-low {
            border-left-color: #10b981;
        }

        .task-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .task-category-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(139, 92, 246, 0.2);
            color: #8b5cf6;
        }

        .task-card-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .task-card-title.completed {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .task-card-description {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            margin-bottom: 15px;
        }

        .task-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-date {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .task-actions {
            display: flex;
            gap: 10px;
        }

        .task-action-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .task-action-btn:hover {
            color: white;
            transform: scale(1.1);
        }

        .task-action-btn.complete:hover {
            color: #10b981;
        }

        .task-action-btn.delete:hover {
            color: #ef4444;
        }

        .empty-tasks {
            text-align: center;
            padding: 60px;
            color: rgba(255, 255, 255, 0.3);
            grid-column: 1 / -1;
        }

        .empty-tasks i {
            font-size: 60px;
            margin-bottom: 20px;
            color: rgba(139, 92, 246, 0.3);
        }

        /* ========== FOCUS TIMER STYLES ========== */
        .timer-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
        }

        .timer-title {
            color: white;
            font-size: 32px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .timer-title i {
            color: #8b5cf6;
        }

        .timer-circle {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 0 auto 30px;
        }

        .timer-circle-outer {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 15px solid rgba(139, 92, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timer-display {
            font-size: 72px;
            font-weight: 800;
            color: white;
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
            line-height: 1;
        }

        .timer-label {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .timer-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .timer-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timer-btn:hover {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            transform: scale(1.1);
        }

        .timer-btn.start {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            font-size: 32px;
        }

        .timer-modes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .mode-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mode-card:hover {
            background: rgba(139, 92, 246, 0.15);
            transform: translateY(-5px);
        }

        .mode-card.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
            border: 1px solid #8b5cf6;
        }

        .mode-time {
            color: white;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .mode-name {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        /* ========== MY SCHEDULE STYLES ========== */
        .schedule-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
        }

        .schedule-title {
            color: white;
            font-size: 32px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .schedule-title i {
            color: #8b5cf6;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .calendar-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 25px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header h3 {
            color: white;
            font-size: 20px;
        }

        .calendar-nav {
            display: flex;
            gap: 10px;
        }

        .calendar-nav button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
        }

        .calendar-nav button:hover {
            background: rgba(139, 92, 246, 0.2);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }

        .weekday {
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            font-size: 14px;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .calendar-day {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            cursor: pointer;
            position: relative;
        }

        .calendar-day:hover {
            background: rgba(139, 92, 246, 0.2);
        }

        .calendar-day.today {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
        }

        .calendar-day.has-event {
            border: 1px solid #8b5cf6;
        }

        .calendar-day.has-event::after {
            content: '';
            position: absolute;
            bottom: 2px;
            width: 4px;
            height: 4px;
            background: #8b5cf6;
            border-radius: 50%;
        }

        .event-form-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 25px;
        }

        .event-form-title {
            color: white;
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .event-form-title i {
            color: #8b5cf6;
        }

        .event-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .event-input, .event-select {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
        }

        .event-input:focus, .event-select:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        .event-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .color-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.selected {
            border-color: white;
        }

        .color-work { background: #8b5cf6; }
        .color-personal { background: #ec4899; }
        .color-study { background: #3b82f6; }
        .color-health { background: #10b981; }
        .color-meeting { background: #f59e0b; }

        .add-event-btn {
            padding: 15px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .today-events {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
        }

        .modal {

            backdrop-filter: blur(10px);

        .modal.active {

        /* Image Modal */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .image-modal.active {
            display: flex;
        }

        .modal-content-image {
            max-width: 800px;
            width: 90%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;

        }

        .modal-inspire {

            padding: 10px 20px;

        /* Toast Notification */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 9999;
            animation: slideUp 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-grid,
            .category-grid,
            .achievements-grid,
            .favorites-grid,
            .gallery-grid,
            .notes-stats,
            .categories-section {
                grid-template-columns: repeat(2, 1fr);
            }
            .quote-day-section,
            .schedule-grid {
                grid-template-columns: 1fr;
            }
        }

        function calculateStreak(tasks) {
            if (tasks.length === 0) return 0;
            let streak = 0;
            const today = new Date().toISOString().split('T')[0];
            const completedToday = tasks.some(t => t.completed && t.date === today);
            if (!completedToday) return 0;
            streak = 1;
            let currentDate = new Date(today);
            for (let i = 1; i <= 30; i++) {
                currentDate.setDate(currentDate.getDate() - 1);
                const dateStr = currentDate.toISOString().split('T')[0];
                const completedOnDate = tasks.some(t => t.completed && t.date === dateStr);
                if (completedOnDate) streak++;
                else break;
            }
            return streak;
        }

        function renderCalendar(year, month, events) {
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date().toISOString().split('T')[0];
            
            let html = '';
            
            for (let i = 0; i < firstDay; i++) {
                html += `<div class="calendar-day" style="background: transparent;"></div>`;
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const hasEvent = events.some(e => e.date === dateStr);
                const isToday = dateStr === today;
                
                html += `
                    <div class="calendar-day ${isToday ? 'today' : ''} ${hasEvent ? 'has-event' : ''}" onclick="scheduleSelectDate('${dateStr}')">
                        ${day}
                    </div>
                `;
            }
            
            return html;
        }

        function scheduleChangeMonth(delta) {
            scheduleCurrentMonth += delta;
            if (scheduleCurrentMonth < 0) {
                scheduleCurrentMonth = 11;
                scheduleCurrentYear--;
            } else if (scheduleCurrentMonth > 11) {
                scheduleCurrentMonth = 0;
                scheduleCurrentYear++;
            }
            
            document.getElementById('calendarMonthYear').textContent = new Date(scheduleCurrentYear, scheduleCurrentMonth).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            
            const calendarDays = document.getElementById('calendarDays');
            if (calendarDays) {
                calendarDays.innerHTML = renderCalendar(scheduleCurrentYear, scheduleCurrentMonth, scheduleEvents);
            }
        }

        // Helper function to get last 7 days
        function getLast7Days() {
            const days = [];
            for (let i = 6; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                days.push(date.toISOString().split('T')[0]);
            }
            return days;
        }

        // Get REAL daily task completion data
        function getDailyTaskCompletion(tasks, days) {
            return days.map(date => {
                return tasks.filter(t => t.date === date && t.completed).length;
            });
        }

                const ctx = taskCanvas.getContext('2d');
                taskCanvas.chart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],

                            data: taskData,

        function generateHeatmap(tasks) {
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            let html = '';
            
            days.forEach(day => html += `<div class="heatmap-day">${day}</div>`);
            
            const taskCounts = {};
            tasks.forEach(task => { if (task.date) taskCounts[task.date] = (taskCounts[task.date] || 0) + 1; });
            
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            for (let i = 0; i < firstDay; i++) {
                html += `<div class="heatmap-cell" style="background: rgba(255,255,255,0.02);"></div>`;
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const count = taskCounts[dateStr] || 0;
                
                let bgColor;
                if (count === 0) bgColor = 'rgba(255,255,255,0.02)';
                else if (count <= 2) bgColor = 'rgba(139,92,246,0.2)';
                else if (count <= 4) bgColor = 'rgba(139,92,246,0.4)';
                else if (count <= 6) bgColor = 'rgba(139,92,246,0.6)';
                else bgColor = 'rgba(139,92,246,0.9)';
                
                html += `<div class="heatmap-cell" style="background: ${bgColor};" title="${days[(firstDay + day - 1) % 7]} ${day}: ${count} task${count !== 1 ? 's' : ''}"></div>`;
            }
            
            return html;
        }

                            <div class="stat-mini-icon"><i class="fas fa-thumbtack"></i></div>
                            <div class="stat-mini-info">
                                <h4 id="pinnedNotes">${notes.filter(n => n.pinned).length}</h4>
                                <p>Pinned</p>
                            </div>
                        </div>
                        <div class="stat-mini-card">
                            <div class="stat-mini-icon"><i class="fas fa-tags"></i></div>
                            <div class="stat-mini-info">
                                <h4 id="noteCategories">${[...new Set(notes.map(n => n.category))].length}</h4>
                                <p>Categories</p>
                            </div>
                        </div>
                        <div class="stat-mini-card">
                            <div class="stat-mini-icon"><i class="fas fa-pen"></i></div>
                            <div class="stat-mini-info">
                                <h4 id="lastEdited">${notes.length > 0 ? new Date(notes.sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt))[0].updatedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '-'}</h4>
                                <p>Last Edited</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="categories-section">
                        <div class="category-tag active" onclick="filterNotes('all')">All</div>
                        <div class="category-tag" onclick="filterNotes('personal')">Personal</div>
                        <div class="category-tag" onclick="filterNotes('work')">Work</div>
                        <div class="category-tag" onclick="filterNotes('study')">Study</div>
                        <div class="category-tag" onclick="filterNotes('ideas')">Ideas</div>
                    </div>
                    
                    <div class="notes-grid" id="notesGrid">
                        ${renderNotesList(notes)}
                    </div>
                </div>
            `;
        }

        function renderNotesList(notes) {
            if (notes.length === 0) {
                return `<div class="empty-tasks"><i class="fas fa-sticky-note"></i><h3>No notes yet</h3><p>Create your first note</p></div>`;
            }
            
            let filtered = [...notes];
            if (notesCurrentFilter !== 'all') filtered = filtered.filter(n => n.category === notesCurrentFilter);
            if (notesSearchTerm) filtered = filtered.filter(n => n.title.toLowerCase().includes(notesSearchTerm) || n.content.toLowerCase().includes(notesSearchTerm));
            if (notesShowPinned) filtered = filtered.filter(n => n.pinned);
            
            filtered.sort((a, b) => {
                if (a.pinned && !b.pinned) return -1;
                if (!a.pinned && b.pinned) return 1;
                return new Date(b.updatedAt) - new Date(a.updatedAt);
            });
            
            if (filtered.length === 0) {
                return `<div class="empty-tasks"><i class="fas fa-search"></i><h3>No matching notes</h3><p>Try a different filter</p></div>`;
            }
            
            let html = '';
            filtered.forEach(note => {
                const date = new Date(note.updatedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                html += `
                    <div class="note-card ${note.color || 'purple'}">
                        <div class="note-header">
                            <span class="note-category">${note.category}</span>
                            <div class="note-pin ${note.pinned ? 'pinned' : ''}" onclick="togglePin('${note.id}')"><i class="fas fa-thumbtack"></i></div>
                        </div>
                        <h3 class="note-title">${note.title}</h3>
                        <div class="note-content">${note.content.substring(0, 100)}${note.content.length > 100 ? '...' : ''}</div>
                        <div class="note-footer">
                            <span>${date}</span>
                            <div class="note-actions">
                                <button onclick="editNote('${note.id}')"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteNote('${note.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            return html;
        }

        function openAddNoteModal() {
            document.getElementById('addNoteModal').classList.add('active');
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
            document.getElementById('noteCategory').value = 'personal';
            notesSelectedColor = 'purple';
            document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
            document.querySelector('.color-work').classList.add('selected');
        }

        function closeAddNoteModal() {
            document.getElementById('addNoteModal').classList.remove('active');
        }

        function selectNoteColor(color) {
            notesSelectedColor = color;
            document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        function addNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('noteContent').value.trim();
            if (!title || !content) { alert('Please enter title and content'); return; }
            
            const username = document.getElementById('displayName').textContent;
            const allNotes = JSON.parse(localStorage.getItem('planit_notes')) || {};
            let notesList = allNotes[username] || [];
            
            const newNote = {
                id: Date.now().toString(),
                title, content,
                category: document.getElementById('noteCategory').value,
                color: notesSelectedColor,
                pinned: false,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            notesList.push(newNote);
            allNotes[username] = notesList;
            localStorage.setItem('planit_notes', JSON.stringify(allNotes));
            
            closeAddNoteModal();
            loadContent('quick-notes');
            showToast('Note created!');
        }

        function editNote(id) {
            const username = document.getElementById('displayName').textContent;
            const allNotes = JSON.parse(localStorage.getItem('planit_notes')) || {};
            let notesList = allNotes[username] || [];
            const note = notesList.find(n => n.id === id);
            if (!note) return;
            
            notesCurrentEditId = id;
            document.getElementById('editNoteTitle').value = note.title;
            document.getElementById('editNoteContent').value = note.content;
            document.getElementById('editNoteCategory').value = note.category;
            document.getElementById('editNoteModal').classList.add('active');
        }

        function closeEditNoteModal() {
            document.getElementById('editNoteModal').classList.remove('active');
            notesCurrentEditId = null;
        }

        function saveEditedNote() {
            if (!notesCurrentEditId) return;
            
            const username = document.getElementById('displayName').textContent;
            const allNotes = JSON.parse(localStorage.getItem('planit_notes')) || {};
            let notesList = allNotes[username] || [];
            const note = notesList.find(n => n.id === notesCurrentEditId);
            if (!note) return;
            
            note.title = document.getElementById('editNoteTitle').value.trim();
            note.content = document.getElementById('editNoteContent').value.trim();
            note.category = document.getElementById('editNoteCategory').value;
            note.updatedAt = new Date().toISOString();
            
            allNotes[username] = notesList;
            localStorage.setItem('planit_notes', JSON.stringify(allNotes));
            
            closeEditNoteModal();
            loadContent('quick-notes');
            showToast('Note updated!');
        }

        function deleteNote(id) {
            if (!confirm('Delete this note?')) return;
            
            const username = document.getElementById('displayName').textContent;
            const allNotes = JSON.parse(localStorage.getItem('planit_notes')) || {};
            let notesList = allNotes[username] || [];
            
            notesList = notesList.filter(n => n.id !== id);
            allNotes[username] = notesList;
            localStorage.setItem('planit_notes', JSON.stringify(allNotes));
            
            loadContent('quick-notes');
            showToast('Note deleted');
        }

        function togglePin(id) {
            const username = document.getElementById('displayName').textContent;
            const allNotes = JSON.parse(localStorage.getItem('planit_notes')) || {};
            let notesList = allNotes[username] || [];
            const note = notesList.find(n => n.id === id);
            if (note) {
                note.pinned = !note.pinned;
                note.updatedAt = new Date().toISOString();
                allNotes[username] = notesList;
                localStorage.setItem('planit_notes', JSON.stringify(allNotes));
                loadContent('quick-notes');
                showToast(note.pinned ? 'Pinned' : 'Unpinned');
            }
        }

        function filterNotes(category) {
            notesCurrentFilter = category;
            document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            loadContent('quick-notes');
        }

        function searchNotes() {
            notesSearchTerm = document.getElementById('notesSearch')?.value.toLowerCase() || '';
            loadContent('quick-notes');
        }

        function toggleShowPinned() {
            notesShowPinned = !notesShowPinned;
            loadContent('quick-notes');
        }

        function exportNotes() {
            if (notes.length === 0) { alert('No notes to export'); return; }
            
            let text = '=== PLANIT NOTES ===\n\n';
            notes.forEach(n => {
                text += `[${n.category.toUpperCase()}] ${n.title}\n`;
                text += `${n.content}\n`;
                text += `Updated: ${new Date(n.updatedAt).toLocaleString()}\n`;
                text += `${n.pinned ? '📌 PINNED\n' : ''}`;
                text += '-'.repeat(40) + '\n\n';
            });
            
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `notes-${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            showToast('Notes exported!');
        }

 /*DSA*/       // ========== UNDO/REDO FOR TASKS ==========
let taskUndoStack = [];
let taskRedoStack = [];

// Save current state before any task operation
function saveTaskState(operation) {
    const username = document.getElementById('displayName').textContent;
    const allTasks = JSON.parse(localStorage.getItem('planit_tasks')) || {};
    const tasks = allTasks[username] || [];
    
    // Save current state to undo stack
    taskUndoStack.push({
        tasks: JSON.parse(JSON.stringify(tasks)),
        operation: operation
    });
    
    // Clear redo stack on new operation
    taskRedoStack = [];
    
    // Limit undo stack size to 20
    if (taskUndoStack.length > 20) {
        taskUndoStack.shift();
    }
    
    updateUndoRedoButtons();
}

// Undo last task operation
function undoTask() {
    if (taskUndoStack.length === 0) return;
    
    const username = document.getElementById('displayName').textContent;
    const allTasks = JSON.parse(localStorage.getItem('planit_tasks')) || {};
    const currentTasks = allTasks[username] || [];
    
    // Save current state to redo stack
    taskRedoStack.push({
        tasks: JSON.parse(JSON.stringify(currentTasks)),
        operation: 'redo'
    });
    
    // Restore previous state
    const previous = taskUndoStack.pop();
    allTasks[username] = previous.tasks;
    localStorage.setItem('planit_tasks', JSON.stringify(allTasks));
    
    // Update UI
    loadContent('smart-tasks');
    showToast('Undo: ' + previous.operation);
    updateUndoRedoButtons();
}

// Redo last undone task operation
function redooTask() {
    if (taskRedoStack.length === 0) return;
    
    const username = document.getElementById('displayName').textContent;
    const allTasks = JSON.parse(localStorage.getItem('planit_tasks')) || {};
    const currentTasks = allTasks[username] || [];
    
    // Save current state to undo stack
    taskUndoStack.push({
        tasks: JSON.parse(JSON.stringify(currentTasks)),
        operation: 'undo'
    });
    
    // Restore redone state
    const next = taskRedoStack.pop();
    allTasks[username] = next.tasks;
    localStorage.setItem('planit_tasks', JSON.stringify(allTasks));
    
    // Update UI
    loadContent('smart-tasks');
    showToast('Redo successful');
    updateUndoRedoButtons();
}

// Update undo/redo button states
function updateUndoRedoButtons() {
    const undoBtn = document.getElementById('undoTaskBtn');
    const redoBtn = document.getElementById('redooTaskBtn');
    
    if (undoBtn) {
        undoBtn.disabled = taskUndoStack.length === 0;
        undoBtn.style.opacity = taskUndoStack.length === 0 ? '0.5' : '1';
    }
    
    if (redoBtn) {
        redoBtn.disabled = taskRedoStack.length === 0;
        redoBtn.style.opacity = taskRedoStack.length === 0 ? '0.5' : '1';
    }
}

// Override existing task functions to include Undo/Redo
const originalAddNewTask = addNewTask;
window.addNewTask = function() {
    saveTaskState('Add Task');
    originalAddNewTask();
};

const originalToggleTaskComplete = toggleTaskComplete;
window.toggleTaskComplete = function(id) {
    const username = document.getElementById('displayName').textContent;
    const allTasks = JSON.parse(localStorage.getItem('planit_tasks')) || {};
    const tasks = allTasks[username] || [];
    const task = tasks.find(t => t.id === id);
    
    saveTaskState(task.completed ? 'Mark Incomplete' : 'Mark Complete');
    originalToggleTaskComplete(id);
};

const originalDeleteTask = deleteTask;
window.deleteTask = function(id) {
    const username = document.getElementById('displayName').textContent;
    const allTasks = JSON.parse(localStorage.getItem('planit_tasks')) || {};
    const tasks = allTasks[username] || [];
    const task = tasks.find(t => t.id === id);
    
    if (task) {
        saveTaskState('Delete Task: ' + task.title);
    }
    originalDeleteTask(id);
};

// Clear undo/redo stacks when switching users
function clearUndoRedoStacks() {
    taskUndoStack = [];
    taskRedoStack = [];
    updateUndoRedoButtons();
}/*DSA end*/
